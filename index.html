<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BetBoom Overlay</title>

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:transparent;
  font-family:Arial,sans-serif;
}

/* SCALE WRAP */
#wrap{
  position:fixed;
  inset:0;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding-bottom:40px;
}

/* OVERLAY */
#overlay{
  position:relative;

  width:min(90vw,1080px);
  min-height:190px;

  overflow:hidden;

  display:flex;
  align-items:center;
  justify-content:space-between;

  gap:40px;

  padding:
    clamp(20px,2vw,32px)
    clamp(30px,4vw,70px);

  border-radius:28px;

  background:
    linear-gradient(
      135deg,
      rgba(5,11,22,.96) 0%,
      rgba(2,6,13,.96) 60%,
      rgba(8,17,31,.96) 100%
    );

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
    inset 0 0 40px rgba(255,255,255,.03),
    0 0 50px rgba(0,0,0,.7),
    0 0 120px rgba(0,120,255,.10);

  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);

  isolation:isolate;

  transition:
    opacity .4s ease,
    transform .6s cubic-bezier(.22,1,.36,1);

  opacity:0;
  transform:translateY(120px);
}

#overlay.show{
  opacity:1;
  transform:translateY(0);
}

/* LIGHTS */
#overlay::before,
#overlay::after{
  content:"";
  position:absolute;
  width:520px;
  height:520px;
  border-radius:50%;
  filter:blur(22px);
  animation:pulseGlow 8s ease-in-out infinite;
}

#overlay::before{
  left:-260px;
  top:-260px;

  background:radial-gradient(circle,
    rgba(255,0,0,1) 0%,
    rgba(255,120,0,1) 18%,
    rgba(255,220,0,1) 32%,
    rgba(255,255,255,.95) 42%,
    rgba(0,140,255,.95) 55%,
    rgba(0,50,140,.95) 67%,
    rgba(0,0,0,0) 76%);
}

#overlay::after{
  right:-260px;
  bottom:-260px;
  transform:rotate(180deg);

  background:radial-gradient(circle,
    rgba(255,0,0,1) 0%,
    rgba(255,120,0,1) 18%,
    rgba(255,220,0,1) 32%,
    rgba(255,255,255,.95) 42%,
    rgba(0,140,255,.95) 55%,
    rgba(0,50,140,.95) 67%,
    rgba(0,0,0,0) 76%);
}

/* TEXT */
.left{
  position:relative;
  z-index:5;
}

.logo{
  font-size:clamp(42px,5vw,78px);
  font-weight:900;
  color:#fff;
  letter-spacing:-3px;
}

.sub{
  margin-top:10px;

  font-size:clamp(16px,2vw,28px);

  font-weight:900;
  color:#fff;

  letter-spacing:2px;
  text-transform:uppercase;
}

/* PROMO */
.codeBox{
  position:relative;
  z-index:5;

  min-width:260px;
  height:94px;

  padding:0 40px;

  border-radius:24px;

  background:
    linear-gradient(
      180deg,
      #fff,
      #ebebeb
    );

  display:flex;
  align-items:center;
  justify-content:center;
}

#promo{
  font-size:clamp(28px,3vw,44px);
  font-weight:900;
  color:#000;
  letter-spacing:2px;
}

/* ANIM */
@keyframes pulseGlow{
  0%{
    transform:scale(1) rotate(0deg);
    opacity:.7;
  }

  50%{
    transform:scale(1.08) rotate(8deg);
    opacity:1;
  }

  100%{
    transform:scale(1) rotate(0deg);
    opacity:.7;
  }
}
</style>
</head>

<body>

<div id="wrap">

  <div id="overlay">

    <div class="left">
      <div class="logo">BetBoom</div>
      <div class="sub">ЗАБИРАЙ ФРИБЕТ</div>
    </div>

    <div class="codeBox">
      <div id="promo">BET777</div>
    </div>

  </div>

</div>

<script>
const overlay =
  document.getElementById("overlay");

const promo =
  document.getElementById("promo");

const params =
  new URLSearchParams(location.search);

const code =
  params.get("promo") || "BET777";

const visible =
  params.get("show") || "1";

promo.innerText = code;

if(visible === "1"){
  overlay.classList.add("show");
}
</script>

</body>
</html>
