<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BetBoom Overlay</title>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:transparent;
  font-family:Arial;
}

#wrap{
  position:fixed;
  inset:0;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding-bottom:40px;
}

#overlay{
  width:min(90vw,1080px);
  min-height:190px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:30px 60px;
  border-radius:28px;

  background:rgba(10,15,25,.95);
  border:1px solid rgba(255,255,255,.08);

  opacity:0;
  transform:translateY(120px);
  transition:.5s;
}

#overlay.show{
  opacity:1;
  transform:translateY(0);
}

.logo{
  font-size:60px;
  font-weight:900;
  color:white;
}

.sub{
  color:white;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:2px;
}

.codeBox{
  background:white;
  padding:20px 50px;
  border-radius:20px;
}

#promo{
  font-size:40px;
  font-weight:900;
}
</style>
</head>

<body>

<div id="wrap">
  <div id="overlay">
    <div>
      <div class="logo">BetBoom</div>
      <div class="sub">ЗАБИРАЙ ФРИБЕТ</div>
    </div>

    <div class="codeBox">
      <div id="promo">BET777</div>
    </div>
  </div>
</div>

<script>
const overlay = document.getElementById("overlay");
const promo = document.getElementById("promo");

async function load(){
  try{
    const res = await fetch("state.json?t=" + Date.now());
    const data = await res.json();

    promo.innerText = data.promo;

    if(data.visible){
      overlay.classList.add("show");
    } else {
      overlay.classList.remove("show");
    }

  } catch(e){}
}

setInterval(load, 2000);
load();
</script>

</body>
</html>
