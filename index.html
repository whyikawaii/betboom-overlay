<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BetBoom Admin</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b1220;
  font-family:Arial;
  color:white;
}

.panel{
  width:460px;
  padding:30px;
  border-radius:22px;
  background:linear-gradient(145deg,#111827,#0f172a);
  border:1px solid rgba(255,255,255,.08);
}

h1{margin-top:0}

input{
  width:100%;
  height:50px;
  border-radius:14px;
  border:none;
  background:#1e293b;
  color:white;
  font-size:18px;
  padding:0 15px;
  margin-bottom:10px;
}

button{
  border:none;
  border-radius:14px;
  padding:12px;
  font-weight:bold;
  cursor:pointer;
  margin-top:6px;
}

.add{background:#22c55e;width:100%;}
.show{background:#00aaff;color:white;flex:1;}
.hide{background:#ef4444;color:white;flex:1;}
.next{background:white;width:100%;color:black;}

.row{display:flex;gap:10px;margin-top:10px;}

.item{
  display:flex;
  justify-content:space-between;
  background:#111827;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
}

.small button{
  margin-left:5px;
  padding:5px 8px;
  border-radius:8px;
  background:#334155;
  color:white;
}
</style>
</head>

<body>

<div class="panel">
  <h1>Admin Panel</h1>

  <input id="input" placeholder="Промокод">

  <button class="add" onclick="add()">+ добавить в очередь</button>

  <div class="row">
    <button class="show" onclick="show()">SHOW</button>
    <button class="hide" onclick="hide()">HIDE</button>
  </div>

  <button class="next" onclick="next()">NEXT PROMO</button>

  <div id="list"></div>
</div>

<script>
const input = document.getElementById("input");
const list = document.getElementById("list");
const channel = new BroadcastChannel("betboom");

function getQueue(){
  return JSON.parse(localStorage.getItem("bb_queue") || '["BET777"]');
}

function setQueue(q){
  localStorage.setItem("bb_queue", JSON.stringify(q));
}

function getIndex(){
  return Number(localStorage.getItem("bb_index") || 0);
}

function setIndex(i){
  localStorage.setItem("bb_index", i);
}

function render(){
  const q = getQueue();

  list.innerHTML = q.map((c,i)=>`
    <div class="item">
      <div>${i+1}. ${c}</div>
      <div class="small">
        <button onclick="set(${i})">▶</button>
        <button onclick="del(${i})">✕</button>
      </div>
    </div>
  `).join("");
}

function add(){
  const val = input.value.trim();
  if(!val) return;

  const q = getQueue();
  q.push(val);

  setQueue(q);
  input.value="";

  channel.postMessage("update");
  render();
}

function del(i){
  const q = getQueue();
  q.splice(i,1);

  setQueue(q);
  setIndex(0);

  channel.postMessage("update");
  render();
}

function set(i){
  setIndex(i);
  channel.postMessage("update");
}

function next(){
  const q = getQueue();
  if(q.length === 0) return;

  let i = getIndex();
  i = (i + 1) % q.length;

  setIndex(i);
  channel.postMessage("update");
}

function show(){
  localStorage.setItem("bb_visible","true");
  channel.postMessage("update");
}

function hide(){
  localStorage.setItem("bb_visible","false");
  channel.postMessage("update");
}

window.addEventListener("storage", render);
channel.onmessage = render;

render();
</script>

</body>
</html>
