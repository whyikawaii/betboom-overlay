<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BetBoom Premium Overlay</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  overflow:hidden;
  background:transparent;
  font-family:Arial,sans-serif;
}

/* OVERLAY */
#overlay{
  position:fixed;
  left:50%;
  bottom:40px;
  transform:translate(-50%,220px) scale(.98);
  width:1080px;
  height:190px;
  overflow:hidden;
  opacity:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 70px;

  background: linear-gradient(135deg,
    rgba(5,11,22,.96) 0%,
    rgba(2,6,13,.96) 60%,
    rgba(8,17,31,.96) 100%);

  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:28px;

  box-shadow:
    inset 0 0 40px rgba(255,255,255,.03),
    0 0 50px rgba(0,0,0,.7),
    0 0 120px rgba(0,120,255,.10);

  transition: transform .85s cubic-bezier(.22,1,.36,1),
              opacity .5s ease,
              filter .5s ease;
}

/* SHOW */
#overlay.show{
  transform:translate(-50%,0) scale(1);
  opacity:1;
  filter:brightness(1.05);
}

/* LIGHTS (оставил как есть) */
#overlay::before, #overlay::after{
  content:"";
  position:absolute;
  width:520px;
  height:520px;
  border-radius:50%;
  filter:blur(22px);
  animation:pulseGlow 8s ease-in-out infinite;
}

#overlay::before{
  left:-260px;
  top:-260px;
  background:radial-gradient(circle,
    rgba(255,0,0,1) 0%,
    rgba(255,120,0,1) 18%,
    rgba(255,220,0,1) 32%,
    rgba(255,255,255,.95) 42%,
    rgba(0,140,255,.95) 55%,
    rgba(0,50,140,.95) 67%,
    rgba(0,0,0,0) 76%);
  opacity:.95;
}

#overlay::after{
  right:-260px;
  bottom:-260px;
  transform:rotate(180deg);
  background:radial-gradient(circle,
    rgba(255,0,0,1) 0%,
    rgba(255,120,0,1) 18%,
    rgba(255,220,0,1) 32%,
    rgba(255,255,255,.95) 42%,
    rgba(0,140,255,.95) 55%,
    rgba(0,50,140,.95) 67%,
    rgba(0,0,0,0) 76%);
  opacity:.75;
}

/* TEXT */
.left{position:relative;z-index:5;}

.logo{
  font-size:78px;
  font-weight:900;
  color:#fff;
  letter-spacing:-3px;
  text-shadow:0 3px 10px rgba(0,0,0,.9),0 0 6px rgba(0,0,0,.6);
}

.sub{
  margin-top:12px;
  font-size:28px;
  font-weight:900;
  color:#fff;
  letter-spacing:2px;
  text-transform:uppercase;
  text-shadow:0 2px 8px rgba(0,0,0,.9);
}

/* CODE */
.codeBox{
  position:relative;
  z-index:5;
  min-width:340px;
  height:94px;
  padding:0 46px;
  border-radius:24px;

  background:linear-gradient(180deg,#fff,#ebebeb);
  display:flex;
  align-items:center;
  justify-content:center;

  transition:width .35s ease, transform .25s ease;
  overflow:hidden;
}

.codeBox.pop{
  transform:scale(1.05);
}

#promo{
  font-size:44px;
  font-weight:900;
  color:#000;
  letter-spacing:2px;
  animation:textGlow .8s ease;
}

/* ANIM */
@keyframes pulseGlow{
  0%{transform:scale(1) rotate(0deg);opacity:.7;}
  50%{transform:scale(1.08) rotate(8deg);opacity:1;}
  100%{transform:scale(1) rotate(0deg);opacity:.7;}
}

@keyframes textGlow{
  0%{opacity:.3; transform:translateY(6px);}
  100%{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div id="overlay">
  <div class="left">
    <div class="logo">BetBoom</div>
    <div class="sub">ЗАБИРАЙ ФРИБЕТ</div>
  </div>

  <div class="codeBox" id="codeBox">
    <div id="promo">BET777</div>
  </div>
</div>

<script>
const overlay = document.getElementById("overlay");
const promoEl = document.getElementById("promo");
const codeBox = document.getElementById("codeBox");

const channel = new BroadcastChannel("betboom");

function getQueue(){
  return JSON.parse(localStorage.getItem("bb_queue") || '["BET777"]');
}

function getIndex(){
  return parseInt(localStorage.getItem("bb_index") || "0");
}

function render(){
  const queue = getQueue();
  let index = getIndex();

  if(index >= queue.length) index = 0;

  const promo = queue[index] || "BET777";

  promoEl.innerText = promo;

  const base = 260;
  const perChar = 18;
  const width = Math.min(520, base + promo.length * perChar);

  codeBox.style.width = width + "px";

  overlay.classList.toggle("show", localStorage.getItem("bb_visible") === "true");

  codeBox.classList.remove("pop");
  void codeBox.offsetWidth;
  codeBox.classList.add("pop");
}

window.addEventListener("storage", render);
channel.onmessage = render;

render();
</script>

</body>
</html>
