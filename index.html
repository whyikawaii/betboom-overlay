<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>BetBoom Premium Overlay</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    overflow:hidden;
    background:transparent;
    font-family:Arial,sans-serif;
}

/* ========================================= */
/* OVERLAY */
/* ========================================= */

#overlay{
    position:fixed;

    left:50%;
    bottom:40px;

    transform:translate(-50%,220px);

    width:1080px;
    height:190px;

    overflow:hidden;

    opacity:0;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 70px;

    background:
        linear-gradient(
            135deg,
            rgba(5,11,22,.96) 0%,
            rgba(2,6,13,.96) 60%,
            rgba(8,17,31,.96) 100%
        );

    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,.08);

    border-radius:28px;

    box-shadow:
        inset 0 0 40px rgba(255,255,255,.03),
        0 0 50px rgba(0,0,0,.7),
        0 0 120px rgba(0,120,255,.10);

    transition:
        transform .8s cubic-bezier(.22,1,.36,1),
        opacity .5s ease;
}

/* ========================================= */
/* RAINBOW LIGHTS */
/* ========================================= */

#overlay::before{
    content:"";

    position:absolute;

    width:520px;
    height:520px;

    left:-260px;
    top:-260px;

    border-radius:50%;

    background:
        radial-gradient(
            circle,
            rgba(255,0,0,1) 0%,
            rgba(255,120,0,1) 18%,
            rgba(255,220,0,1) 32%,
            rgba(255,255,255,.95) 42%,
            rgba(0,140,255,.95) 55%,
            rgba(0,50,140,.95) 67%,
            rgba(0,0,0,0) 76%
        );

    filter:blur(22px);

    opacity:.95;

    animation:pulseGlow 8s ease-in-out infinite;
}

#overlay::after{
    content:"";

    position:absolute;

    width:520px;
    height:520px;

    right:-260px;
    bottom:-260px;

    border-radius:50%;

    background:
        radial-gradient(
            circle,
            rgba(255,0,0,1) 0%,
            rgba(255,120,0,1) 18%,
            rgba(255,220,0,1) 32%,
            rgba(255,255,255,.95) 42%,
            rgba(0,140,255,.95) 55%,
            rgba(0,50,140,.95) 67%,
            rgba(0,0,0,0) 76%
        );

    filter:blur(22px);

    opacity:.75;

    transform:rotate(180deg);

    animation:pulseGlow 8s ease-in-out infinite reverse;
}

/* ========================================= */
/* SHOW */
/* ========================================= */

#overlay.show{
    transform:translate(-50%,0);
    opacity:1;
}

/* ========================================= */
/* TOP LIGHT */
/* ========================================= */

.topLine{
    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:1px;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,.7),
            transparent
        );

    z-index:6;
}

/* ========================================= */
/* SHINE */
/* ========================================= */

.shine{
    position:absolute;
    inset:0;

    background:
        linear-gradient(
            120deg,
            transparent 0%,
            rgba(255,255,255,.03) 45%,
            rgba(255,255,255,.12) 50%,
            rgba(255,255,255,.03) 55%,
            transparent 100%
        );

    animation:shine 6s linear infinite;
}

/* ========================================= */
/* LEFT */
/* ========================================= */

.left{
    position:relative;
    z-index:5;
}

/* ========================================= */
/* LOGO */
/* ========================================= */

.logo{
    font-size:78px;
    font-weight:900;

    color:white;

    letter-spacing:-4px;

    line-height:1;

    text-shadow:
        0 3px 10px rgba(0,0,0,.85),
        0 0 30px rgba(255,255,255,.08);
}

/* ========================================= */
/* SUBTEXT */
/* ========================================= */

.sub{
    margin-top:12px;

    font-size:28px;
    font-weight:900;

    color:white;

    letter-spacing:2px;

    text-transform:uppercase;

    text-shadow:
        0 2px 10px rgba(0,0,0,.9);
}

/* ========================================= */
/* PROMO BOX */
/* ========================================= */

.codeBox{
    position:relative;
    z-index:5;

    min-width:340px;
    height:94px;

    padding:0 46px;

    border-radius:24px;

    background:
        linear-gradient(
            180deg,
            rgba(255,255,255,1) 0%,
            rgba(235,235,235,1) 100%
        );

    border:1px solid rgba(255,255,255,.18);

    display:flex;
    align-items:center;
    justify-content:center;

    overflow:hidden;

    box-shadow:
        0 0 25px rgba(255,255,255,.12),
        0 0 80px rgba(0,120,255,.14);

    transition:
        transform .25s ease,
        box-shadow .25s ease;
}

.codeBox:hover{
    transform:translateY(-2px) scale(1.02);

    box-shadow:
        0 0 30px rgba(255,255,255,.18),
        0 0 100px rgba(0,120,255,.18);
}

/* ========================================= */
/* PROMO TEXT */
/* ========================================= */

#promo{
    font-size:46px;
    font-weight:900;

    color:black;

    letter-spacing:3px;

    white-space:nowrap;

    text-transform:uppercase;

    text-shadow:
        0 1px 0 rgba(255,255,255,.6);
}

/* ========================================= */
/* ANIMATIONS */
/* ========================================= */

@keyframes shine{
    0%{
        transform:translateX(-120%);
    }

    100%{
        transform:translateX(120%);
    }
}

@keyframes pulseGlow{

    0%{
        transform:scale(1) rotate(0deg);
        opacity:.7;
    }

    50%{
        transform:scale(1.08) rotate(8deg);
        opacity:1;
    }

    100%{
        transform:scale(1) rotate(0deg);
        opacity:.7;
    }
}

</style>
</head>

<body>

<div id="overlay">

    <div class="topLine"></div>

    <div class="shine"></div>

    <div class="left">

        <div class="logo">
            BetBoom
        </div>

        <div class="sub">
            ЗАБИРАЙ ФРИБЕТ
        </div>

    </div>

    <div class="codeBox" id="codeBox">

        <div id="promo">
            BET777
        </div>

    </div>

</div>

<script>

function updateOverlay(){

    const promo =
        localStorage.getItem("bb_promo")
        || "BET777";

    const visible =
        localStorage.getItem("bb_visible");

    const promoElement =
        document.getElementById("promo");

    const overlay =
        document.getElementById("overlay");

    const codeBox =
        document.getElementById("codeBox");

    promoElement.innerText = promo;

    /* AUTO WIDTH */

    const width =
        220 + (promo.length * 22);

    codeBox.style.width =
        width + "px";

    /* SHOW / HIDE */

    if(visible === "true"){

        overlay.classList.add("show");

    }else{

        overlay.classList.remove("show");

    }
}

updateOverlay();

setInterval(updateOverlay,300);

/* DEMO AUTO SHOW */

setTimeout(()=>{

    localStorage.setItem(
        "bb_visible",
        "true"
    );

},300);

</script>

</body>
</html>
