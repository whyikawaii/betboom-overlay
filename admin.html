<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BetBoom Overlay</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  overflow:hidden;
  background:transparent;
  font-family:Arial,sans-serif;
}

#overlay{
  position:fixed;
  left:50%;
  bottom:40px;
  transform:translate(-50%,220px);
  width:1080px;
  height:190px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 70px;

  background:linear-gradient(135deg,
    rgba(5,11,22,.96),
    rgba(2,6,13,.96),
    rgba(8,17,31,.96));

  border-radius:28px;
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(14px);

  opacity:0;
  transition:.7s cubic-bezier(.22,1,.36,1);
}

#overlay.show{
  transform:translate(-50%,0);
  opacity:1;
}

.logo{
  font-size:78px;
  font-weight:900;
  color:white;
}

.sub{
  font-size:26px;
  font-weight:900;
  color:white;
  opacity:.9;
}

.codeBox{
  min-width:340px;
  height:94px;
  border-radius:22px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.3s;
}

#promo{
  font-size:44px;
  font-weight:900;
  color:#000;
}
</style>
</head>

<body>

<div id="overlay">
  <div>
    <div class="logo">BetBoom</div>
    <div class="sub">ЗАБИРАЙ ФРИБЕТ</div>
  </div>

  <div class="codeBox">
    <div id="promo">BET777</div>
  </div>
</div>

<script>
const overlay = document.getElementById("overlay");
const promoEl = document.getElementById("promo");
const channel = new BroadcastChannel("betboom");

function getQueue(){
  return JSON.parse(localStorage.getItem("bb_queue") || '["BET777"]');
}

function getIndex(){
  return Number(localStorage.getItem("bb_index") || 0);
}

function render(){
  const queue = getQueue();
  let index = getIndex();

  if(index >= queue.length) index = 0;

  const promo = queue[index] || "BET777";
  promoEl.innerText = promo;

  overlay.classList.toggle("show", localStorage.getItem("bb_visible") === "true");
}

window.addEventListener("storage", render);
channel.onmessage = render;

// страховка (GitHub Pages иногда тупит)
setInterval(render, 1000);

render();
</script>

</body>
</html>
