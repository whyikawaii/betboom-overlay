<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BetBoom Admin</title>

<style>
body{
  background:#0b1220;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.panel{
  width:460px;
  padding:35px;
  border-radius:24px;
  background:linear-gradient(145deg,#111827,#0f172a);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 0 40px rgba(0,140,255,.15);
}

input{
  width:100%;
  height:54px;
  border:none;
  border-radius:16px;
  background:#1e293b;
  color:white;
  padding:0 18px;
  font-size:20px;
  font-weight:700;
  margin-bottom:14px;
}

button{
  width:100%;
  border:none;
  cursor:pointer;
  font-weight:700;
  border-radius:16px;
  padding:16px;
  margin-top:10px;
}

.save{ background:#22c55e; color:#000; }
.show{ background:#00aaff; color:#fff; }
.hide{ background:#ef4444; color:#fff; }
</style>
</head>

<body>

<div class="panel">
  <h1>BetBoom Admin</h1>

  <input id="promoInput" placeholder="Введите промокод"/>

  <button class="save" onclick="savePromo()">СОХРАНИТЬ</button>
  <button class="show" onclick="setVisible(true)">ПОКАЗАТЬ</button>
  <button class="hide" onclick="setVisible(false)">СКРЫТЬ</button>
</div>

<script>
const GITHUB_TOKEN = "1231321";
const REPO = "whyikawaii/betboom-overlay";
const PATH = "state.json";

let state = {
  promo: "BET777",
  visible: true
};

function updateState(patch){
  state = {...state, ...patch};
  saveToGitHub();
}

async function getSHA(){
  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`, {
    headers: { Authorization: `Bearer ${GITHUB_TOKEN}` }
  });
  const data = await res.json();
  return data.sha;
}

async function saveToGitHub(){
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(state,null,2))));
  const sha = await getSHA();

  await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`, {
    method:"PUT",
    headers:{
      "Authorization": `Bearer ${GITHUB_TOKEN}`,
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      message:"update state",
      content,
      sha
    })
  });
}

function savePromo(){
  const val = document.getElementById("promoInput").value.trim();
  updateState({ promo: val });
}

function setVisible(v){
  updateState({ visible: v });
}
</script>

</body>
</html>
