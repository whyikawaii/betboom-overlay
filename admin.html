
```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BetBoom Admin</title>

<style>
body{
  background:#0b1220;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.panel{
  width:460px;
  padding:35px;
  border-radius:24px;

  background:linear-gradient(145deg,#111827,#0f172a);
  border:1px solid rgba(255,255,255,.08);

  box-shadow:0 0 40px rgba(0,140,255,.15);
  animation:floatIn .8s ease;
}

h1{
  margin-top:0;
  font-size:34px;
}

label{
  opacity:.8;
}

input{
  width:100%;
  height:54px;
  border:none;
  border-radius:16px;
  background:#1e293b;
  color:white;
  padding:0 18px;
  font-size:20px;
  font-weight:700;
  margin-bottom:14px;
  transition:.2s;
}

input:focus{
  outline:none;
  transform:scale(1.02);
}

button{
  border:none;
  cursor:pointer;
  font-weight:700;
  border-radius:16px;
  transition:.2s;
}

button:hover{
  transform:translateY(-2px);
}

.row{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.save{
  width:100%;
  background:#22c55e;
  color:#000;
  padding:16px;
  font-size:18px;
}

.show{
  background:#00aaff;
  color:white;
  flex:1;
  padding:14px;
}

.hide{
  background:#ef4444;
  color:white;
  flex:1;
  padding:14px;
}

.status{
  margin-top:18px;
  opacity:.7;
  font-size:18px;
}

/* ANIM */
@keyframes floatIn{
  from{
    transform:translateY(20px);
    opacity:0;
  }
  to{
    transform:translateY(0);
    opacity:1;
  }
}
</style>
</head>

<body>

<div class="panel">
  <h1>BetBoom Admin</h1>

  <label>ПРОМОКОД</label>

  <input
    id="promoInput"
    placeholder="Введите код"
  />

  <button
    class="save"
    onclick="savePromo()">
    СОХРАНИТЬ ПРОМО
  </button>

  <div class="row">
    <button
      class="show"
      onclick="showOverlay()">
      ПОКАЗАТЬ
    </button>

    <button
      class="hide"
      onclick="hideOverlay()">
      СКРЫТЬ
    </button>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
const input = document.getElementById("promoInput");
const statusText = document.getElementById("status");

const channel = new BroadcastChannel("betboom");

function savePromo(){
  const val = input.value.trim();

  if(!val) return;

  localStorage.setItem("bb_promo", val);

  channel.postMessage("update");

  input.blur();
}

function showOverlay(){
  localStorage.setItem("bb_visible","true");

  channel.postMessage("update");

  updateStatus();
}

function hideOverlay(){
  localStorage.setItem("bb_visible","false");

  channel.postMessage("update");

  updateStatus();
}

function updateStatus(){
  statusText.innerText =
    localStorage.getItem("bb_visible") === "true"
      ? "Статус: ON"
      : "Статус: OFF";
}

window.addEventListener(
  "storage",
  updateStatus
);

channel.onmessage = updateStatus;

updateStatus();
</script>

</body>
</html>
