<body>

<div class="panel">

<h1>BetBoom Admin</h1>

<input
  id="promoInput"
  placeholder="Введите промокод"
/>

<button
  class="save"
  onclick="savePromo()">
  СОХРАНИТЬ ПРОМО
</button>

<div class="row">

  <button
    class="show"
    onclick="setVisible(true)">
    ПОКАЗАТЬ
  </button>

  <button
    class="hide"
    onclick="setVisible(false)">
    СКРЫТЬ
  </button>

</div>

</div>

<script>
let state = {
  promo:"BET777",
  visible:true
};

async function load(){

  try{

    const res =
      await fetch("state.json?t="+Date.now());

    state =
      await res.json();

  }catch(e){}
}

async function save(){

  const content =
JSON.stringify(state,null,2);

  const blob =
    new Blob([content],{
      type:"application/json"
    });

  const a =
    document.createElement("a");

  a.href =
    URL.createObjectURL(blob);

  a.download =
    "state.json";

  a.click();
}

function savePromo(){

  state.promo =
    document
      .getElementById("promoInput")
      .value
      .trim();

  save();
}

function setVisible(v){

  state.visible = v;

  save();
}

load();
</script>

</body>
</html>
