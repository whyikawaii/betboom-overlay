<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BetBoom Admin</title>

<style>
body{
  background:#0b1220;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.panel{
  width:460px;
  padding:35px;
  border-radius:24px;

  background:linear-gradient(145deg,#111827,#0f172a);
  border:1px solid rgba(255,255,255,.08);

  box-shadow:0 0 40px rgba(0,140,255,.15);
  animation:floatIn .8s ease;
}

h1{
  margin-top:0;
  font-size:34px;
}

label{opacity:.8}

input{
  width:100%;
  height:54px;
  border:none;
  border-radius:16px;
  background:#1e293b;
  color:white;
  padding:0 18px;
  font-size:20px;
  font-weight:700;
  margin-bottom:12px;
  transition:.2s;
}

input:focus{
  outline:none;
  transform:scale(1.02);
}

button{
  border:none;
  cursor:pointer;
  font-weight:700;
  border-radius:16px;
  transition:.2s;
}

button:hover{
  transform:translateY(-2px);
}

/* buttons */
.row{display:flex;gap:10px;margin-bottom:12px;}

.add{background:#22c55e;color:#000;padding:14px;}
.show{background:#00aaff;color:white;flex:1;}
.hide{background:#ef4444;color:white;flex:1;}
.save{width:100%;background:white;color:black;padding:16px;margin-top:10px;}

.list{
  margin-top:15px;
  max-height:160px;
  overflow:auto;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111827;
  border-radius:12px;
  margin-bottom:8px;
  animation:fadeIn .3s ease;
}

.smallBtn{
  background:#334155;
  color:white;
  padding:6px 10px;
  border-radius:10px;
  margin-left:5px;
}

.status{
  margin-top:15px;
  opacity:.7;
}

/* ANIM */
@keyframes floatIn{
  from{transform:translateY(20px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

@keyframes fadeIn{
  from{opacity:0;transform:scale(.95);}
  to{opacity:1;transform:scale(1);}
}
</style>
</head>

<body>

<div class="panel">
  <h1>BetBoom Admin</h1>

  <label>НОВЫЙ ПРОМОКОД</label>
  <input id="promoInput" placeholder="Введите код"/>

  <button class="add" onclick="addPromo()">+ ДОБАВИТЬ В ОЧЕРЕДЬ</button>

  <div class="row">
    <button class="show" onclick="showOverlay()">ПОКАЗАТЬ</button>
    <button class="hide" onclick="hideOverlay()">СКРЫТЬ</button>
  </div>

  <button class="save" onclick="nextPromo()">▶ СЛЕДУЮЩИЙ ПРОМО</button>

  <div class="list" id="list"></div>

  <div class="status" id="status"></div>
</div>

<script>
const input = document.getElementById("promoInput");
const list = document.getElementById("list");
const statusText = document.getElementById("status");

const channel = new BroadcastChannel("betboom");

function getQueue(){
  return JSON.parse(localStorage.getItem("bb_queue") || '["BET777"]');
}

function setQueue(q){
  localStorage.setItem("bb_queue", JSON.stringify(q));
}

function getIndex(){
  return parseInt(localStorage.getItem("bb_index") || "0");
}

function setIndex(i){
  localStorage.setItem("bb_index", i);
}

function renderList(){
  const queue = getQueue();

  list.innerHTML = queue.map((c,i)=>`
    <div class="item">
      <div>#${i+1} ${c}</div>
      <div>
        <button class="smallBtn" onclick="removePromo(${i})">✕</button>
        <button class="smallBtn" onclick="setPromo(${i})">▶</button>
      </div>
    </div>
  `).join("");
}

function addPromo(){
  const val = input.value.trim();
  if(!val) return;

  const q = getQueue();
  q.push(val);

  setQueue(q);
  input.value = "";

  channel.postMessage("update");
  renderList();
}

function removePromo(i){
  const q = getQueue();
  q.splice(i,1);

  setQueue(q);
  setIndex(0);

  channel.postMessage("update");
  renderList();
}

function setPromo(i){
  setIndex(i);
  channel.postMessage("update");
}

function nextPromo(){
  const q = getQueue();
  let i = getIndex();

  i = (i + 1) % q.length;
  setIndex(i);

  channel.postMessage("update");
}

function showOverlay(){
  localStorage.setItem("bb_visible","true");
  channel.postMessage("update");
  updateStatus();
}

function hideOverlay(){
  localStorage.setItem("bb_visible","false");
  channel.postMessage("update");
  updateStatus();
}

function updateStatus(){
  statusText.innerText =
    localStorage.getItem("bb_visible") === "true"
      ? "Статус: ON"
      : "Статус: OFF";
}

window.addEventListener("storage", ()=>{renderList();updateStatus();});
channel.onmessage = ()=>{renderList();updateStatus();};

renderList();
updateStatus();
</script>

</body>
</html>
