<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BetBoom Admin</title>

<style>
body{
    background:#0b1220;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.panel{
    width:420px;
    padding:35px;
    border-radius:24px;

    background:
    linear-gradient(
    145deg,
    #111827,
    #0f172a
    );

    border:1px solid rgba(255,255,255,.08);

    box-shadow:
    0 0 40px rgba(0,140,255,.15);

}

h1{
    margin-top:0;
    font-size:34px;
}

label{
    display:block;
    margin-bottom:10px;
    font-size:15px;
    opacity:.8;
}

input{
    width:100%;
    height:54px;

    border:none;
    outline:none;

    border-radius:16px;

    background:#1e293b;

    color:white;

    padding:0 18px;

    font-size:22px;
    font-weight:700;

    margin-bottom:25px;
}

.buttons{
    display:flex;
    gap:14px;
}

button{
    flex:1;

    height:58px;

    border:none;

    border-radius:18px;

    font-size:18px;
    font-weight:700;

    cursor:pointer;

    transition:.2s;
}

.show{
    background:#00aaff;
    color:white;
}

.hide{
    background:#ef4444;
    color:white;
}

button:hover{
    transform:translateY(-2px);
}

.save{
    width:100%;
    margin-top:18px;

    background:white;
    color:black;
}

.status{
    margin-top:20px;
    opacity:.7;
}
</style>
</head>
<body>

<div class="panel">

    <h1>BetBoom Admin</h1>

    <label>ПРОМОКОД</label>
    <input id="promoInput" placeholder="BET777">

    <div class="buttons">
        <button class="show" onclick="showOverlay()">
            ПОКАЗАТЬ
        </button>

        <button class="hide" onclick="hideOverlay()">
            СКРЫТЬ
        </button>
    </div>

    <button class="save" onclick="savePromo()">
        СОХРАНИТЬ ПРОМО
    </button>

    <div class="status" id="status">
        Статус: OFF
    </div>

</div>

<script>

const promoInput = document.getElementById("promoInput");
const statusText = document.getElementById("status");

promoInput.value =
localStorage.getItem("bb_promo") || "BET777";

function savePromo(){

    localStorage.setItem(
        "bb_promo",
        promoInput.value
    );

    alert("Промокод сохранён");
}

function showOverlay(){

    localStorage.setItem(
        "bb_visible",
        "true"
    );

    updateStatus();
}

function hideOverlay(){

    localStorage.setItem(
        "bb_visible",
        "false"
    );

    updateStatus();
}

function updateStatus(){

    const visible =
    localStorage.getItem("bb_visible");

    if(visible === "true"){
        statusText.innerText =
        "Статус: ON";
    }else{
        statusText.innerText =
        "Статус: OFF";
    }
}

updateStatus();

</script>

</body>
</html>
